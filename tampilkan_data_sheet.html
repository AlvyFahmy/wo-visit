<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Data Sheet</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #1a73e8; color: white; padding: 12px; text-align: left; font-size: 13px; white-space: nowrap; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:hover { background-color: #f8f9fa; }

        .img-cell img { 
            width: 80px; height: 80px; object-fit: cover; 
            border-radius: 6px; border: 1px solid #ddd;
        }
        #loading { text-align: center; padding: 30px; font-weight: bold; color: #666; }
        .error-msg { color: red; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Data Laporan Customer</h2>
    <div id="loading">Memproses Data dari Google Sheets...</div>
    <div id="error" class="error-msg" style="display:none;"></div>
    
    <div class="table-responsive">
        <table id="data-table" style="display:none;">
            <thead>
                <tr>
                    <th>ID NUMBER</th>
                    <th>CUSTOMER NAME</th>
                    <th>TEAM</th>
                    <th>REASON</th>
                    <th>SUB REASON</th>
                    <th>NOTES</th>
                    <th>DATE REPORT</th>
                    <th>FOTO</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Link CSV Anda
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRohrCVA8Nuq7huEi7TOXw7WWEjQV7NHCwfCjITTNpIq5Tdj6Xvub6ZOcjmk1DAde8dCaHqoQYSTnX2/pub?gid=0&single=true&output=csv";

    // Fungsi untuk memparsing CSV sederhana (menangani koma di dalam tanda kutip)
    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        return lines.map(line => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        });
    }

    async function fetchData() {
        try {
            // Kita coba fetch langsung, jika gagal (CORS), user perlu tahu
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error("Gagal mengambil data dari Google");
            
            const text = await response.text();
            const data = parseCSV(text);
            const tbody = document.getElementById('table-body');

            // i = 1 untuk skip baris header dari CSV
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (row.length < 2) continue; // Skip baris kosong

                const tr = document.createElement('tr');
                
                // Iterasi kolom 0 sampai 7 (8 kolom)
                for (let j = 0; j < 8; j++) {
                    const td = document.createElement('td');
                    let cellValue = row[j] ? row[j].trim() : "";

                    // Bersihkan tanda kutip jika ada
                    cellValue = cellValue.replace(/^"|"$/g, '');

                    if (j === 7 && cellValue.startsWith('http')) {
                        td.className = 'img-cell';
                        td.innerHTML = `<a href="${cellValue}" target="_blank"><img src="${cellValue}" onerror="this.src='https://via.placeholder.com/80?text=No+Photo'"></a>`;
                    } else {
                        td.textContent = cellValue;
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('data-table').style.display = 'table';

        } catch (error) {
            console.error(error);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerHTML = `
                <b>Gagal Memuat Data:</b><br>
                1. Pastikan Spreadsheet sudah di "Publish to Web" sebagai CSV.<br>
                2. Jika Anda membuka file HTML ini langsung dari komputer (file://), beberapa browser memblokirnya.<br>
                Coba upload file HTML ini ke hosting atau jalankan di server lokal.
            `;
        }
    }

    fetchData();
</script>

</body>
</html>
