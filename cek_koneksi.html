<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Connection Checker - WO System</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #0984e3; padding-bottom: 10px; color: #2d3436; }
        .status { font-weight: bold; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        .ok { background: #dff9fb; color: #009432; }
        .err { background: #fab1a0; color: #d63031; }
        .loading { background: #fff9c4; color: #f57f17; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>
    <h1>🔍 Spreadsheet Connection Reviewer</h1>
    <p>ID: <code>14XRw8TmhAGAk-EunatQzhq6TKXfRfFi2gV2Wf7lCqP8</code></p>
    
    <div id="results"></div>

<script>
    const SID = "14XRw8TmhAGAk-EunatQzhq6TKXfRfFi2gV2Wf7lCqP8";
    const GIDS = {
        "userlogin (User Auth)": "0",
        "wo-schedule (Jadwal)": "1420691938",
        "reason (Dropdown)": "1394679585",
        "hasilsurvei (History)": "1369807600"
    };

    async function check(name, gid) {
        const container = document.getElementById('results');
        const box = document.createElement('div');
        box.className = 'box';
        box.innerHTML = `<h2>${name}</h2><div id="stat-${gid}" class="status loading">Menghubungkan...</div><div id="tbl-${gid}"></div>`;
        container.appendChild(box);

        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&gid=${gid}`);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            
            const stat = document.getElementById(`stat-${gid}`);
            stat.className = "status ok";
            stat.innerText = `✓ TERHUBUNG (${json.table.rows.length} Baris Data)`;

            let html = '<table><thead><tr>';
            json.table.cols.forEach(c => html += `<th>${c.label || '-'}</th>`);
            html += '</tr></thead><tbody>';
            
            json.table.rows.slice(0, 3).forEach(r => {
                html += '<tr>';
                r.c.forEach(v => html += `<td>${v ? (v.f || v.v) : ''}</td>`);
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById(`tbl-${gid}`).innerHTML = html;

        } catch (e) {
            const stat = document.getElementById(`stat-${gid}`);
            stat.className = "status err";
            stat.innerText = "❌ GAGAL: " + e.message;
        }
    }

    Object.keys(GIDS).forEach(key => check(key, GIDS[key]));
</script>
</body>
</html>
