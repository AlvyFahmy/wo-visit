<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WO Visit System - Google Sheets Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00b894; --secondary: #0984e3; --dark: #2d3436; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; color: var(--dark); }
        .hidden { display: none !important; }
        
        /* Loading Overlay */
        .loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; display:flex; justify-content:center; align-items:center; flex-direction: column; }
        
        /* Login Page */
        #loginPage { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--secondary), var(--primary)); }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        
        /* Header & Navigation */
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #a4b0be; cursor: pointer; }
        .nav-item.active { color: var(--secondary); font-weight: bold; }
        
        /* Cards & UI */
        .container { padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--secondary); position: relative; }
        .card b { font-size: 16px; display: block; margin-bottom: 5px; }
        .card p { margin: 4px 0; font-size: 13px; color: #57606f; line-height: 1.4; }
        .address-box { background: #f8f9fa; padding: 8px; border-radius: 8px; margin-top: 8px; border: 1px solid #eee; }

        /* Form Elements */
        .btn { border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; font-size: 14px; }
        .btn-primary { background: var(--secondary); color: white; }
        .btn-primary:disabled { background: #ccc; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ddd; }
        .img-history { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="loader" class="loader hidden">
    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--secondary)"></i>
    <p style="margin-top:10px; font-size:12px; color:#666">Sinkronisasi Data...</p>
</div>

<!-- PAGE: LOGIN -->
<section id="loginPage">
    <div class="login-card">
        <h2 style="margin:0; color: var(--secondary)">WO VISIT</h2>
        <p style="color: #777; font-size: 13px; margin-bottom: 20px;">Google Sheets Database Mode</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">MASUK</button>
        </form>
    </div>
</section>

<!-- PAGE: MAIN DASHBOARD -->
<section id="mainPage" class="hidden">
    <div class="header">
        <div>
            <b id="teamName" style="display:block; font-size: 14px; color: var(--dark)">-</b>
            <small id="userDisplay" style="color: #888;">-</small>
        </div>
        <div>
            <i class="fas fa-sync-alt" onclick="initSystem()" style="color: var(--primary); margin-right: 20px; cursor: pointer;"></i>
            <i class="fas fa-sign-out-alt" onclick="location.reload()" style="color: #ff4757; font-size: 18px; cursor: pointer;"></i>
        </div>
    </div>

    <div class="container">
        <h3 id="viewTitle" style="margin-bottom: 15px; font-size: 18px;">Daftar Kunjungan</h3>
        <div id="listContainer"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="navP" onclick="switchTab('pending')">
            <i class="fas fa-list-ul" style="font-size: 20px; margin-bottom: 4px;"></i><span>JADWAL</span>
        </div>
        <div class="nav-item" id="navH" onclick="switchTab('history')">
            <i class="fas fa-history" style="font-size: 20px; margin-bottom: 4px;"></i><span>SELESAI</span>
        </div>
    </div>
</section>

<!-- PAGE: FORM REPORT -->
<section id="formPage" class="hidden">
    <div class="header">
        <i class="fas fa-chevron-left" onclick="switchTab('pending')" style="cursor:pointer; font-size: 20px;"></i>
        <b style="font-size: 16px;">Input Laporan</b>
        <span></span>
    </div>
    <div class="container">
        <div class="card">
            <b id="lblCust">-</b>
            <small id="lblID" style="color:#999">ID WO: -</small>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            
            <form id="reportForm">
                <label style="font-size: 12px; font-weight: bold; color: #666;">HASIL KUNJUNGAN</label>
                <select id="res1" onchange="loadSub()" required></select>
                
                <label style="font-size: 12px; font-weight: bold; color: #666;">DETAIL ALASAN</label>
                <select id="res2" required><option value="">Pilih Detail</option></select>
                
                <label style="font-size: 12px; font-weight: bold; color: #666;">CATATAN</label>
                <textarea id="notes" rows="3" placeholder="Ketik keterangan tambahan di sini..."></textarea>
                
                <label style="font-size: 12px; font-weight: bold; color: #666;">FOTO BUKTI</label>
                <input type="file" id="fileInp" accept="image/*" capture="environment" required>
                <img id="preview">
                
                <button type="submit" id="btnSubmit" class="btn btn-primary" style="margin-top: 20px;">KIRIM LAPORAN</button>
            </form>
        </div>
    </div>
</section>

<script>
    // --- KONFIGURASI ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyBOR--J-v_ay6u-8Yjj5O2z9ZtJIIG44SWyc-2QcHDyCT8ZHxgJ-zjeG_taTD5ZBak/exec";
    
    const SOURCES = {
        user: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqqaReNso-O5jfJeWGgTL-MujsGSClAMSeHU2TnvOrz72Cwxg3jXF-Yc72VDI-MqpMzN2hLtZZnnfY/gviz/tq?tqx=out:json",
        wo: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQYwME5HDwTNsKY7HTMawXtrt0wauwN5P3N_8rgLwH-AeR0kohtc3C5zw9gPaXTZrbWsTVpgKasiQZE/gviz/tq?tqx=out:json",
        reason: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT390YPmnjp24lrtF1iibWq_jCS5elJn_jHRAqRFAFEkbrmC5L2VEp0gHEXGxzhB55uhZTuZWSGSoNE/gviz/tq?tqx=out:json",
        history: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRohrCVA8Nuq7huEi7TOXw7WWEjQV7NHCwfCjITTNpIq5Tdj6Xvub6ZOcjmk1DAde8dCaHqoQYSTnX2/gviz/tq?tqx=out:json"
    };

    let dataStore = { users:[], wo:[], reasons:[], history:[] };
    let currentUser = null;
    let currentMode = 'pending';

    // --- FETCH ENGINE ---
    async function fetchData(url) {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const cols = json.table.cols.map(c => c.label.trim());
            return json.table.rows.map(r => {
                let obj = {};
                r.c.forEach((v, i) => { if(cols[i]) obj[cols[i]] = v ? (v.f || v.v) : ""; });
                return obj;
            });
        } catch (e) { return []; }
    }

    async function initSystem() {
        document.getElementById('loader').classList.remove('hidden');
        [dataStore.users, dataStore.wo, dataStore.reasons, dataStore.history] = await Promise.all([
            fetchData(SOURCES.user), 
            fetchData(SOURCES.wo), 
            fetchData(SOURCES.reason), 
            fetchData(SOURCES.history)
        ]);
        
        const r1 = document.getElementById('res1');
        r1.innerHTML = '<option value="">Pilih Hasil</option>';
        const unique = [...new Set(dataStore.reasons.map(x => x.REASON))];
        unique.forEach(r => r1.add(new Option(r, r)));
        
        if(currentUser) renderList();
        document.getElementById('loader').classList.add('hidden');
    }

    // --- AUTH ---
    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        
        currentUser = dataStore.users.find(x => x.USER == u && x.PASS == p);
        if(currentUser) {
            document.getElementById('teamName').innerText = currentUser['NAMA TEAM SURVEI'];
            document.getElementById('userDisplay').innerText = "Surveyor: " + u;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            renderList();
        } else {
            alert("Login Gagal! Pastikan Username & Password sesuai dengan Google Sheet.");
        }
    };

    // --- RENDER ---
    function renderList() {
        const cont = document.getElementById('listContainer');
        cont.innerHTML = "";
        
        const historyIDs = dataStore.history.map(h => String(h.ID_NUMBER));
        const teamData = dataStore.wo.filter(w => w['NAMA TEAM SURVEI'] === currentUser['NAMA TEAM SURVEI']);
        
        const list = teamData.filter(w => {
            const reported = historyIDs.includes(String(w.ID_NUMBER));
            return currentMode === 'pending' ? !reported : reported;
        });

        if(list.length === 0) {
            cont.innerHTML = `<div style="text-align:center; padding:40px; color:#999">
                <i class="fas fa-folder-open fa-3x"></i><br><p>Tidak ada data</p></div>`;
            return;
        }

        list.forEach(w => {
            const h = dataStore.history.find(x => String(x.ID_NUMBER) === String(w.ID_NUMBER));
            cont.innerHTML += `
            <div class="card" style="border-left-color: ${currentMode === 'pending' ? 'var(--secondary)' : 'var(--primary)'}">
                <b>${w.CUSTOMER_NAME}</b>
                <p style="font-size:11px; font-weight:bold; color:var(--secondary)">ID: ${w.ID_NUMBER}</p>
                <div class="address-box">
                    <p><i class="fas fa-map-marker-alt" style="width:15px"></i> ${w.INSTALLATION_ADDRESS}</p>
                </div>
                <p style="margin-top:8px"><i class="fas fa-phone" style="width:15px"></i> ${w['MOBILE PHONE']}</p>
                <p><i class="far fa-calendar-alt" style="width:15px"></i> Jadwal: ${w['SCHEDULE DATE']}</p>
                
                ${currentMode === 'pending' 
                    ? `<button class="btn btn-primary" onclick="openForm('${w.ID_NUMBER}','${w.CUSTOMER_NAME}')">INPUT LAPORAN</button>`
                    : `<div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; border-top:1px solid #eee; padding-top:10px">
                        ${h.FOTO ? `<img src="${h.FOTO}" class="img-history" onclick="window.open(this.src)">` : '<span></span>'}
                        <div style="text-align:right">
                            <span style="color:var(--primary); font-weight:bold; font-size:11px;"><i class="fas fa-check-circle"></i> REPORTED</span>
                            <small style="display:block; font-size:9px; color:#999">${h.DATE_REPORT}</small>
                        </div>
                       </div>`
                }
            </div>`;
        });
    }

    // --- LOGIC ---
    function openForm(id, name) {
        document.getElementById('lblID').innerText = "ID WO: " + id;
        document.getElementById('lblCust').innerText = name;
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('formPage').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function loadSub() {
        const val = document.getElementById('res1').value;
        const sub = document.getElementById('res2');
        sub.innerHTML = '<option value="">Pilih Detail</option>';
        dataStore.reasons.filter(x => x.REASON === val).forEach(r => sub.add(new Option(r['SUB REASON'], r['SUB REASON'])));
    }

    function switchTab(t) {
        currentMode = t;
        document.getElementById('navP').classList.toggle('active', t === 'pending');
        document.getElementById('navH').classList.toggle('active', t === 'history');
        document.getElementById('viewTitle').innerText = t === 'pending' ? 'Daftar Kunjungan' : 'Laporan Terkirim';
        document.getElementById('mainPage').classList.remove('hidden');
        document.getElementById('formPage').classList.add('hidden');
        renderList();
    }

    document.getElementById('fileInp').onchange = (e) => {
        const p = document.getElementById('preview');
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ex) => { 
                const img = new Image();
                img.src = ex.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    p.src = canvas.toDataURL('image/jpeg', 0.7);
                    p.style.display = 'block';
                };
            };
            reader.readAsDataURL(file);
        }
    };

    document.getElementById('reportForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "MENGIRIM...";
        document.getElementById('loader').classList.remove('hidden');

        const payload = {
            ID_NUMBER: document.getElementById('lblID').innerText.replace('ID WO: ', ''),
            CUSTOMER_NAME: document.getElementById('lblCust').innerText,
            TEAM: currentUser['NAMA TEAM SURVEI'],
            REASON: document.getElementById('res1').value,
            SUB_REASON: document.getElementById('res2').value,
            NOTES: document.getElementById('notes').value,
            DATE_REPORT: new Date().toLocaleString('id-ID'),
            FOTO: document.getElementById('preview').src
        };

        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Laporan Berhasil Terkirim!");
            document.getElementById('reportForm').reset();
            document.getElementById('preview').style.display = 'none';
            await initSystem();
            switchTab('pending');
        } catch(err) { alert("Terjadi gangguan koneksi!"); }
        finally { btn.disabled = false; btn.innerText = "KIRIM LAPORAN"; document.getElementById('loader').classList.add('hidden'); }
    };

    // Jalankan Sinkronisasi Awal
    initSystem();
</script>
</body>
</html>
